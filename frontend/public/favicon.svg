<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="VillageConnect favicon">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f4c81" />
      <stop offset="55%" stop-color="#1c8c8a" />
      <stop offset="100%" stop-color="#35a65d" />
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e7a46" />
      <stop offset="100%" stop-color="#54b36a" />
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="38%" r="40%">
      <stop offset="0%" stop-color="#fff4b0" />
      <stop offset="100%" stop-color="#ffd06b" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7ff" />
      <stop offset="100%" stop-color="#d8f7ff" />
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#sky)" />
  <circle cx="32" cy="25" r="15" fill="url(#sun)" />

  <path d="M10 46C18 40 25 38 32 40C39 42 46 41 54 35V58H10Z" fill="url(#field)" />
  <path d="M10 52C18 47 25 45 32 46C39 47 46 47 54 43V60H10Z" fill="#0a6039" fill-opacity="0.55" />

  <!-- Left house -->
  <path d="M11 48L16 43L21 48V54H18V50H14V54H11Z" fill="#d0eae2" />
  <rect x="15" y="50" width="2" height="4" rx="0.5" fill="#1d7b67" />
  
  <!-- Right house -->
  <path d="M43 48L48 43L53 48V54H50V50H46V54H43Z" fill="#d0eae2" />
  <rect x="47" y="50" width="2" height="4" rx="0.5" fill="#1d7b67" />

  <!-- Main center house -->
  <path d="M23 44L32 37L41 44V54H35V48H29V54H23Z" fill="#f8fffb" />
  <rect x="30.5" y="48" width="3" height="6" rx="1" fill="#1d7b67" />

  <!-- Crops -->
  <path d="M14 55L14 58 M16 56L16 59 M18 55L18 58 M20 57L20 60 M22 56L22 59" stroke="#bfee90" stroke-width="0.8" stroke-linecap="round" />
  <path d="M44 56L44 59 M46 55L46 58 M48 57L48 60 M50 56L50 59" stroke="#bfee90" stroke-width="0.8" stroke-linecap="round" />

  <!-- Farmer -->
  <circle cx="26" cy="56" r="1.2" fill="#e8b98b" />
  <path d="M24.5 54.5L27.5 54.5L26 53Z" fill="#d4af37" /> <!-- Hat -->
  <path d="M25.5 57L26.5 57L27 60L25 60Z" fill="#ffffff" /> <!-- Body -->
  <path d="M25 58L24 60 M27 58L28 60" stroke="#ffffff" stroke-width="0.6" stroke-linecap="round" /> <!-- Arms -->

  <!-- Buffalo -->
  <rect x="37" y="56" width="4" height="2.5" rx="1" fill="#4a4a4a" /> <!-- Body -->
  <circle cx="36.5" cy="56" r="1" fill="#4a4a4a" /> <!-- Head -->
  <path d="M36 55.5A1 1 0 0 0 35 54 M37 55.5A1 1 0 0 1 38 54" fill="none" stroke="#e0e0e0" stroke-width="0.5" /> <!-- Horns -->
  <path d="M37.5 58.5L37.5 60 M38.5 58.5L38.5 60 M39.5 58.5L39.5 60 M40.5 58.5L40.5 60" stroke="#4a4a4a" stroke-width="0.6" stroke-linecap="round" /> <!-- Legs -->
  <path d="M41 57L42 58" stroke="#4a4a4a" stroke-width="0.5" stroke-linecap="round" /> <!-- Tail -->

  <!-- Birds -->
  <path d="M12 18Q14 16 16 18Q14 17 12 18ZM16 18Q18 16 20 18Q18 17 16 18Z" fill="#1d3557" />
  <path d="M44 14Q45.5 12.5 47 14Q45.5 13.5 44 14ZM47 14Q48.5 12.5 50 14Q48.5 13.5 47 14Z" fill="#1d3557" />
  <path d="M48 20Q49 19 50 20Q49 19.5 48 20ZM50 20Q51 19 52 20Q51 19.5 50 20Z" fill="#1d3557" />

  <path d="M21 28A11 11 0 0 1 43 28" fill="none" stroke="url(#signal)" stroke-width="2.8" stroke-linecap="round" />
  <path d="M17 24A15 15 0 0 1 47 24" fill="none" stroke="url(#signal)" stroke-opacity="0.75" stroke-width="2.2" stroke-linecap="round" />
  <circle cx="32" cy="30" r="2.4" fill="#eafcff" />

  <rect x="2" y="2" width="60" height="60" rx="16" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.4" />
</svg>
